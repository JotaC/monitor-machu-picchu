name: Monitor Machu Picchu

on:
  # Permite ejecutar una prueba manual.
  workflow_dispatch:

  # Ejecuta el monitor cada cinco minutos.
  # Posteriormente el código distinguirá entre
  # alertas configuradas cada 5 o cada 10 minutos.
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

permissions:
  contents: write

# Evita dos ejecuciones simultáneas.
concurrency:
  group: monitor-machu-picchu
  cancel-in-progress: false

jobs:
  revisar-disponibilidad:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Conexión con Telegram.
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

      # Conexión con la API de Apps Script.
      ALERTS_API_URL: ${{ secrets.ALERTS_API_URL }}
      MONITOR_API_KEY: ${{ secrets.MONITOR_API_KEY }}

      # En la ejecución manual se enviará un resumen,
      # incluso cuando no se encuentren entradas.
      NOTIFY_STATUS: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Configurar Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Revisar alertas y disponibilidad
        run: npm run monitor

      - name: Guardar estado del monitor
        if: always()
        run: |
          if [ ! -f state.json ]; then
            echo "No se generó state.json."
            exit 0
          fi

          git config user.name "Monitor Machu Picchu"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json

          if git diff --cached --quiet; then
            echo "El estado del monitor no cambió."
            exit 0
          fi

          git commit -m "Actualizar estado del monitor [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Guardar diagnóstico
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: diagnostico-${{ github.run_number }}
          path: diagnostico/
          if-no-files-found: ignore
          retention-days: 7
